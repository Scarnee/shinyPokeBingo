worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  upstream backend {
    server backend:3000;
  }

  upstream grafana {
    server grafana:3000;
  }

  # ── HTTP → redirect to HTTPS ─────────────────────────────────────────────
  server {
    listen 80;
    server_name shinybingogenerator.com www.shinybingogenerator.com;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS ─────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name shinybingogenerator.com www.shinybingogenerator.com;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/shinybingogenerator.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shinybingogenerator.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── API → NestJS backend ──────────────────────────────────────────────
    location /api/ {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 120s;
    }

    # ── Grafana monitoring (/grafana/) ────────────────────────────────────
    location /grafana/ {
      proxy_pass         http://grafana/;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Frontend SPA (catch-all) ──────────────────────────────────────────
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
