<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Main golden star -->
  <polygon
    points="32,4 38.5,22.5 58,22.5 42.5,34.5 48,53 32,42 16,53 21.5,34.5 6,22.5 25.5,22.5"
    fill="#FFD700"
    stroke="#F59E0B"
    stroke-width="1.5"
    stroke-linejoin="round"
  />
  <!-- Inner star highlight -->
  <polygon
    points="32,11 36.8,24.8 51.5,24.8 40,33.2 44.2,47 32,38.5 19.8,47 24,33.2 12.5,24.8 27.2,24.8"
    fill="#FEF08A"
    opacity="0.5"
  />
  <!-- Sparkle top-right -->
  <g transform="translate(50,10)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-3.5" y1="-3.5" x2="3.5" y2="3.5" stroke="#F59E0B" stroke-width="1" stroke-linecap="round"/>
    <line x1="3.5" y1="-3.5" x2="-3.5" y2="3.5" stroke="#F59E0B" stroke-width="1" stroke-linecap="round"/>
  </g>
  <!-- Sparkle top-left -->
  <g transform="translate(12,8)">
    <line x1="0" y1="-3.5" x2="0" y2="3.5" stroke="#FCD34D" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-3.5" y1="0" x2="3.5" y2="0" stroke="#FCD34D" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <!-- Sparkle bottom-right -->
  <g transform="translate(55,48)">
    <line x1="0" y1="-3.5" x2="0" y2="3.5" stroke="#FCD34D" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-3.5" y1="0" x2="3.5" y2="0" stroke="#FCD34D" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>
